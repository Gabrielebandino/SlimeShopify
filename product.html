<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLIME | Product</title>
    <script type="module" src="https://cdn.shopify.com/storefront/web-components.js"></script>
</head>
<body>
    <shopify-store store-domain="slime-resell.myshopify.com" public-access-token="8989149ca1282e74af5ebf3bdc79b5a4">
        
        <header id="main-header"></header>

        <main id="app">
            <!-- Liquid Aurora Background -->
            <div class="liquid-aurora-bg"></div>

            <div id="product-loading" style="height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Inter'; color: #fff;">
                Loading exclusive details...
            </div>
            
            <div id="product-page-layout" class="product-page-layout" style="display: none; padding-top: 80px;">
                <!-- Left Side: Swipeable Image Gallery -->
                <div class="product-page-media-container">
                    <div class="product-page-media-fade"></div>
                    <div id="product-media-gallery" class="product-media-gallery">
                        <!-- JS injected slider images go here -->
                    </div>
                    <div id="product-media-indicators" class="product-media-indicators"></div>
                </div>

                <!-- Right Side: Details Panel -->
                <div class="product-page-details-container container">
                    <!-- Liquid Glass Shell for Text content -->
                    <div class="product-glass-panel">
                        <h1 class="product-page-title" id="product-page-title"></h1>
                        <div class="product-page-price" id="product-page-price"></div>
                        
                        <div class="product-page-variants" id="product-page-variants-container">
                            <h3 style="font-size: 14px; font-weight: 700; text-transform: uppercase; color: rgba(255,255,255,0.6); margin-bottom: 12px; letter-spacing: 1px;">Select Variant</h3>
                            <div id="product-variant-pills" class="variant-pill-grid"></div>
                        </div>

                        <div class="product-page-description" id="product-page-description"></div>

                        <button class="product-add-to-cart custom-add-to-cart disabled" id="product-add-to-cart" disabled>
                            Select Size
                        </button>
                    </div>
                </div>
            </div>
        </main>
        
    </shopify-store>

    <script type="module" src="/main.js"></script>
    <script type="module" src="/components/product-utils.js"></script>
</body>
</html>
