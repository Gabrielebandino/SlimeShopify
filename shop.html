<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLIME | Shop</title>
    <script type="module" src="https://cdn.shopify.com/storefront/web-components.js"></script>
</head>
<body>
    <shopify-store store-domain="slime-resell.myshopify.com" public-access-token="8989149ca1282e74af5ebf3bdc79b5a4">
        
        <header id="main-header"></header>

        <main id="app">
            <div class="shop-background-container" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; overflow: hidden; z-index: -1;">
                <video autoplay muted loop playsinline cover style="position: absolute; width: 100%; height: 100%; top: 50%; left: 50%; object-fit: cover; transform: translate(-50%, -50%);">
                    <source src="/assets/shop_background.mp4" type="video/mp4">
                </video>
                <div class="shop-bg-overlay" style="position: absolute; top:0; left:0; width:100%; height:100%; background: linear-gradient(to bottom, rgba(8,12,10,0.78), rgba(8,12,10,0.88));"></div>
            </div>

            <div class="shop-container container" style="position: relative; z-index: 1;">
                
                <div class="shop-header">
                    <h1 class="shop-title" id="shop-title">Shop Collection</h1>
                    <div class="shop-controls">
                        <div class="filter-dropdown">
                            <select id="filter-condition">
                                <option value="">Condition</option>
                                <option value="new">New</option>
                                <option value="used">Used</option>
                            </select>
                        </div>
                        <div class="sort-dropdown">
                            <select id="sort-order">
                                <option value="">Sort By</option>
                                <option value="price-asc">Price Low to High</option>
                                <option value="price-desc">Price High to Low</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="shop-grid-container" id="shop-grid-container">
                    <!-- Injected by shop-utils.js -->
                </div>

            </div>
        </main>
        
    </shopify-store>

    <script type="module" src="/main.js"></script>
    <script type="module" src="/components/shop-utils.js"></script>
</body>
</html>
